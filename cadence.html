<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CADENCE — jeu de rythme WebXR</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0b0e1a; --bg2:#171130; --ink:#f2ede4; --muted:#8f8ab0;
    --coral:#ff6a5c; --gold:#ffcf5c; --cyan:#4fd6c8;
    --line:rgba(255,255,255,.09); --panel:rgba(255,255,255,.035);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",system-ui,sans-serif; color:var(--ink);
    background:
      radial-gradient(120% 90% at 85% -10%, rgba(79,214,200,.14), transparent 55%),
      radial-gradient(130% 100% at 0% 110%, rgba(255,106,92,.16), transparent 50%),
      linear-gradient(160deg, var(--bg), var(--bg2));
    overflow:auto;
  }
  canvas{display:block}
  #menu{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto}
  .card{width:min(640px,100%);background:var(--panel);border:1px solid var(--line);
    border-radius:20px;backdrop-filter:blur(14px);padding:38px 40px 32px;
    box-shadow:0 30px 80px rgba(0,0,0,.45);margin:auto}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--muted);display:flex;gap:10px;align-items:center}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}
  h1{font-family:"Anton",sans-serif;font-weight:400;font-size:clamp(58px,12vw,104px);
    line-height:.82;letter-spacing:.01em;margin:12px 0 6px;
    background:linear-gradient(92deg,var(--coral),var(--gold) 55%,var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .tagline{color:var(--muted);font-size:15px;margin-bottom:24px}
  /* ---- chargement du son ---- */
  .drop{display:flex;align-items:center;gap:14px;border:1.5px dashed var(--line);border-radius:14px;
    padding:13px 16px;cursor:pointer;transition:border-color .2s,background .2s;background:rgba(255,255,255,.02)}
  .drop:hover,.drop.over{border-color:var(--cyan);background:rgba(79,214,200,.06)}
  .drop .di{font-size:26px;line-height:1;flex:none}
  .drop .dt{display:flex;flex-direction:column;line-height:1.25}
  .drop .dt strong{color:var(--ink);font-weight:600;font-size:15px}
  .drop .dt em{font-style:normal;color:var(--muted);font-size:11.5px;font-family:"IBM Plex Mono",monospace}
  #file{display:none}
  .viz{margin:12px 0 6px;height:54px;width:100%;border-radius:12px;
    background:rgba(0,0,0,.25);border:1px solid var(--line)}
  .status{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted);
    min-height:18px;display:flex;gap:8px;align-items:center}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex:none}
  .dot.ok{background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
  .dot.busy{background:var(--gold);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.35}}

  /* ---- armes : grosses icônes ---- */
  .weapons{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}
  .wpn{cursor:pointer;border:1px solid var(--line);border-radius:16px;padding:16px 8px 12px;
    background:rgba(255,255,255,.02);color:var(--ink);display:flex;flex-direction:column;
    align-items:center;gap:8px;transition:border-color .18s,background .18s,transform .12s,box-shadow .18s}
  .wpn:hover{transform:translateY(-2px);border-color:var(--cyan)}
  .wpn .ic{font-size:34px;line-height:1;filter:drop-shadow(0 3px 8px rgba(0,0,0,.55))}
  .wpn b{font-size:12.5px;font-weight:600;letter-spacing:.01em}
  .wpn.selected{border-color:var(--cyan);background:rgba(79,214,200,.1);
    box-shadow:0 0 0 1px var(--cyan) inset,0 0 22px rgba(79,214,200,.2)}

  /* ---- mains / couleurs ---- */
  .legend{display:flex;gap:10px;align-items:center;margin-top:14px;
    font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted)}
  .legend .pill{display:flex;align-items:center;gap:8px;padding:7px 12px;border:1px solid var(--line);border-radius:999px}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:50%}
  #swap{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--ink);
    font-size:16px;line-height:1;border-radius:10px;padding:8px 13px;cursor:pointer;
    transition:border-color .18s,transform .25s}
  #swap:hover{border-color:var(--cyan);transform:rotate(180deg)}

  /* ---- réglages : sliders à icône ---- */
  .sliders{display:flex;flex-direction:column;gap:11px;margin-top:18px}
  .slider{display:flex;align-items:center;gap:13px}
  .slider .si{font-size:19px;width:24px;text-align:center;flex:none}
  input[type=range]{flex:1;accent-color:var(--coral);height:4px;cursor:pointer}

  /* ---- bascules compactes ---- */
  .chips{display:flex;gap:10px;margin-top:13px}
  .chip{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
    border:1px solid var(--line);border-radius:12px;padding:11px 12px;background:rgba(255,255,255,.02);
    color:var(--ink);font-family:"Inter",sans-serif;font-size:13px;font-weight:600;
    transition:border-color .18s,background .18s,opacity .18s}
  .chip .ci{font-size:17px;line-height:1}
  .chip.on{border-color:var(--cyan);background:rgba(79,214,200,.08);box-shadow:0 0 0 1px var(--cyan) inset}
  .chip.off{opacity:.5}

  /* ---- actions ---- */
  .actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
  button.cta{flex:1;min-width:150px;cursor:pointer;font-family:"Inter",sans-serif;
    font-weight:700;font-size:15px;color:#120c1e;border:none;border-radius:12px;
    padding:16px 18px;background:linear-gradient(92deg,var(--coral),var(--gold));
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .12s,filter .2s,opacity .2s}
  button.cta .bi{font-size:19px}
  button.cta.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  button.cta:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.05)}
  button.cta:disabled{opacity:.4;cursor:not-allowed}

  /* ---- rappel des touches ---- */
  .keys{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
  .keys span{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);
    border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  #hud2d{position:fixed;top:20px;left:20px;z-index:9;font-family:"IBM Plex Mono",monospace;
    color:var(--ink);display:none;text-shadow:0 2px 10px rgba(0,0,0,.6)}
  #hud2d .sc{font-size:34px;font-weight:500}
  #hud2d .cb{font-size:14px;color:var(--gold)}
  #back{position:fixed;top:20px;right:20px;z-index:11;display:none;background:rgba(0,0,0,.4);
    border:1px solid var(--line);color:var(--ink);font-family:"IBM Plex Mono",monospace;
    font-size:12px;border-radius:10px;padding:9px 14px;cursor:pointer}
</style>
</head>
<body>

<div id="menu">
  <div class="card">
    <div class="eyebrow">🥽 meta quest · rythme</div>
    <h1>CADENCE</h1>

    <label class="drop" id="drop" for="file" title="MP3, WAV, OGG — ou glisse un fichier">
      <span class="di">🎵</span>
      <span class="dt"><strong>Charger un son</strong><em>ou glisse-le ici</em></span>
    </label>
    <input id="file" type="file" accept="audio/*" />

    <canvas class="viz" id="viz" width="1120" height="160"></canvas>
    <div class="status"><span class="dot" id="dot"></span><span id="status">En attente d'une piste.</span></div>

    <div class="weapons">
      <button class="wpn selected" data-w="pistols" title="Tir précis · un coup par gâchette">
        <span class="ic">🔫</span><b>Pistolets</b>
      </button>
      <button class="wpn" data-w="swords" title="Sabres laser · tranche au contact, laisse une traînée">
        <span class="ic">🗡️</span><b>Sabres</b>
      </button>
      <button class="wpn" data-w="smg" title="Tir continu · gère la surchauffe">
        <span class="ic">💥</span><b>Mitraillette</b>
      </button>
    </div>

    <div class="legend">
      <span class="pill" id="legLeft" title="main gauche">✋<i></i></span>
      <span class="pill" id="legRight" title="main droite">🤚<i></i></span>
      <button id="swap" title="Inverser les mains">⇄</button>
    </div>

    <div class="sliders">
      <div class="slider" title="Densité des cibles">
        <span class="si">🎯</span>
        <input type="range" id="dens" min="0" max="1" step="0.05" value="0.5" />
      </div>
      <div class="slider" title="Facilité de visée : précis → permissif">
        <span class="si">🧲</span>
        <input type="range" id="assist" min="0" max="1" step="0.05" value="0.5" />
      </div>
    </div>

    <div class="chips">
      <button class="chip on" id="colorMatch" title="Associer chaque cible à la couleur de la main">
        <span class="ci">🎨</span>Couleurs
      </button>
      <button class="chip on" id="soundBtn" title="Effets sonores">
        <span class="ci" id="sndIcon">🔊</span>Sons
      </button>
    </div>

    <div class="actions">
      <button class="cta" id="startVR" disabled><span class="bi">🥽</span>Jouer en VR</button>
      <button class="cta ghost" id="startPreview" disabled><span class="bi">🖥️</span>Bureau</button>
    </div>

    <div class="keys">
      <span title="Gâchette : lancer / tirer">🎯 gâchette</span>
      <span title="B : pause, puis quitter">⏸️ B</span>
      <span title="Bureau : clic tir · P pause · Échap quitter">🖱️ clic · P · Échap</span>
      <span title="Jauge pleine : bouton A ou les 2 gâchettes (bureau : touche U)">✦ ultime : A / 2 gâchettes</span>
    </div>
  </div>
</div>

<button id="back">↩ menu</button>
<div id="hud2d"><div class="sc" id="hudScore">0</div><div class="cb" id="hudCombo">combo ×0</div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ============================ ÉTAT ============================ */
const el = (id)=>document.getElementById(id);
let audioCtx=null, decodedBuffer=null, beats=[], songDuration=0;
let state='menu';
let songStartTime=0, countdownEnd=0, lastCount=0;
let score=0, combo=0, bestCombo=0, hitCount=0, missCount=0, sensitivity=0.5;
let weapon='pistols';             // pistols | swords | smg
let sfxOn=true;                   // effets sonores
let colorMatch=true;              // cibles associées à la couleur de la main

/* Phase 1 : jauge de charge partagée + suivi des basses pour les vagues */
let charge=0;                     // 0..1, commune aux deux mains
let bassAvg=0, lastDrop=0;
const addCharge=x=>{ charge=Math.min(1,charge+x); };

/* Phase 2 : ultime (jauge pleine → effet temporisé selon l'arme) */
let ultActive=false, ultEnd=0, ultWeapon=null, lastUltHud=0, bothTrigPrev=false;
const ULT_DURATION=9000;          // durée d'un ultime (ms)
const ULT_GRENADE_RADIUS=1.7;     // rayon d'explosion des grenades (ultime pistolets)
const SABER_ULT_REACH=2.2, SABER_ULT_LEN=1.5;   // portée / longueur x pendant l'ultime sabre

const TRAVEL=1.9, HIT_Z=-0.55, SPAWN_Z=HIT_Z-9;
const SMG_INTERVAL=0.09, HEAT_PER_SHOT=0.06, HEAT_COOL=0.35, HEAT_RESUME=0.3;
const LANES=[{x:-0.9,y:1.05},{x:-0.45,y:1.5},{x:0,y:1.15},{x:0.45,y:1.5},{x:0.9,y:1.05}];
/* sabre laser : lame inclinée vers l'avant (prolonge la main) ; TRAIL_SEG segments de traînée */
const SABER_BASE=0.10, SABER_LEN=0.72, TRAIL_SEG=16;
const SABER_TILT=-Math.PI/3;   // -60° : bascule la lame de la verticale vers l'axe de visée de la main

const PALETTE=[0xff6a5c, 0x4fd6c8];
const NEUTRAL_TARGET=0xffcf5c;    // couleur des cibles quand l'association est désactivée
let swapColors=false;

/* scoring & cibles spéciales */
const MALUS_PEN=250;              // pénalité si on tire sur un piège
const T_MALUS=0xff1150, T_ENERGY=0x8b5cff, T_BOOM=0xff9500;   // rouge vif / violet / orange vif — distincts du corail-cyan des cibles normales

/* difficulté de visée : 0 = très précis, 1 = très permissif */
let hitAssist=0.5;
let AIM_CONE=THREE.MathUtils.degToRad(9), SWORD_REACH=0.27, HIT_EARLY=0.6, HIT_LATE=1.25;
function applyDifficulty(){
  const a=hitAssist;
  AIM_CONE=THREE.MathUtils.degToRad(6+a*18);   // cône de visée : 6° → 24°
  SWORD_REACH=0.20+a*0.30;                       // portée épée : 0.20 → 0.50
  HIT_EARLY=0.62-a*0.22;                          // ouverture anticipée : 0.62 → 0.40
  HIT_LATE =1.22+a*0.20;                          // tolérance tardive : 1.22 → 1.42
}
applyDifficulty();
function handColor(h){ const right=(h==='right'); return right ? (swapColors?PALETTE[0]:PALETTE[1]) : (swapColors?PALETTE[1]:PALETTE[0]); }

/* ==================== CHARGEMENT + ANALYSE ==================== */
function setStatus(t,s){ el('status').textContent=t; el('dot').className='dot'+(s?' '+s:''); }
function ensureCtx(){ if(!audioCtx){ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); initSfx(audioCtx); } return audioCtx; }
function fmt(s){ const m=Math.floor(s/60),r=Math.round(s%60); return m+':'+String(r).padStart(2,'0'); }

/* ========================= SONS (SFX synthétisés) ========================= */
/* Générés à la volée avec la Web Audio API : aucun fichier externe, et une
   chaîne dédiée (sfxGain → destination) séparée de l'analyseur pour ne pas
   fausser la réactivité des basses. */
let sfxGain=null, sfxNoiseBuf=null;
function initSfx(ctx){
  if(sfxGain) return;
  sfxGain=ctx.createGain(); sfxGain.gain.value=0.55; sfxGain.connect(ctx.destination);
  const len=Math.floor(ctx.sampleRate*0.4);
  sfxNoiseBuf=ctx.createBuffer(1,len,ctx.sampleRate);
  const d=sfxNoiseBuf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
}
function sfxBlip(freq,dur,type,vol,slideTo){
  if(!sfxOn||!audioCtx||!sfxGain) return;
  const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(); o.type=type||'square';
  o.frequency.setValueAtTime(freq,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.4,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t+dur+0.03);
}
function sfxNoise(dur,vol,freq){
  if(!sfxOn||!audioCtx||!sfxNoiseBuf) return;
  const t=audioCtx.currentTime;
  const s=audioCtx.createBufferSource(); s.buffer=sfxNoiseBuf;
  const f=audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq||1200;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(vol||0.3,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  s.connect(f); f.connect(g); g.connect(sfxGain); s.start(t); s.stop(t+dur+0.03);
}
const sfx={
  hit(c){ const b=520+Math.min(c,24)*20; sfxBlip(b,0.12,'triangle',0.34,b*1.9); },  // aigu qui monte avec le combo
  miss(){ sfxNoise(0.22,0.32,700); sfxBlip(150,0.18,'sawtooth',0.16,90); },
  tick(){ sfxBlip(440,0.07,'square',0.22); },
  go(){ sfxBlip(880,0.2,'square',0.32,1250); },
  overheat(){ sfxNoise(0.3,0.38,950); sfxBlip(220,0.25,'sawtooth',0.18,120); },
  start(){ sfxBlip(600,0.1,'triangle',0.26,900); }
};

async function loadFile(file){
  try{
    setStatus('Décodage de « '+file.name+' »…','busy');
    el('startVR').disabled=true; el('startPreview').disabled=true;
    const buf=await file.arrayBuffer();
    decodedBuffer=await ensureCtx().decodeAudioData(buf);
    songDuration=decodedBuffer.duration;
    setStatus('Analyse du rythme…','busy');
    beats=await analyze(decodedBuffer,sensitivity);
    drawWaveform(decodedBuffer,beats);
    setStatus(beats.length+' battements · ~'+estimateBpm(beats)+' BPM · '+fmt(songDuration),'ok');
    el('startVR').disabled=false; el('startPreview').disabled=false;
  }catch(err){ console.error(err); setStatus('Lecture impossible. Essaie un autre fichier audio.',null); }
}
async function analyze(buffer,sens){
  const off=new OfflineAudioContext(1,buffer.length,buffer.sampleRate);
  const src=off.createBufferSource(); src.buffer=buffer;
  const lp=off.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=160;
  const hp=off.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=40;
  src.connect(lp); lp.connect(hp); hp.connect(off.destination); src.start(0);
  const rendered=await off.startRendering();
  const data=rendered.getChannelData(0), sr=rendered.sampleRate;
  const win=Math.floor(sr*0.02), energies=[];
  for(let i=0;i<data.length;i+=win){ let s=0; for(let j=0;j<win&&i+j<data.length;j++){const v=data[i+j];s+=v*v;} energies.push(s/win); }
  const history=Math.floor(1/0.02), minGap=0.14, factor=1.25+(1-sens)*1.6;
  let last=-Infinity; const out=[];
  for(let i=0;i<energies.length;i++){
    const start=Math.max(0,i-history); let avg=0;
    for(let k=start;k<i;k++) avg+=energies[k]; avg/=Math.max(1,i-start);
    const t=i*win/sr;
    if(energies[i]>avg*factor && energies[i]>0.0004 && t-last>minGap){ out.push(t); last=t; }
  }
  return out;
}
function estimateBpm(b){ if(b.length<4)return 0; const g=[]; for(let i=1;i<b.length;i++)g.push(b[i]-b[i-1]);
  g.sort((a,b)=>a-b); const m=g[Math.floor(g.length/2)]; return m>0?Math.round(60/m):0; }
function drawWaveform(buffer,bts){
  const cv=el('viz'),ctx=cv.getContext('2d'),w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);
  const ch=buffer.getChannelData(0),step=Math.floor(ch.length/w);
  ctx.strokeStyle='rgba(143,138,176,.55)'; ctx.lineWidth=1; ctx.beginPath();
  for(let x=0;x<w;x++){ let mn=1,mx=-1; for(let j=0;j<step;j++){const v=ch[x*step+j]||0; if(v<mn)mn=v; if(v>mx)mx=v;}
    ctx.moveTo(x,(1+mn)*h/2); ctx.lineTo(x,(1+mx)*h/2); }
  ctx.stroke();
  ctx.fillStyle='rgba(255,106,92,.85)';
  for(const t of bts){ ctx.fillRect((t/buffer.duration)*w,0,1.4,h); }
}

/* ========================= SCÈNE 3D ========================= */
let renderer,scene,camera,clock;
let controllers=[];
const targets=[], particles=[], floats=[], reactive=[];
/* pools d'objets réutilisables : évitent d'allouer géométries/matériaux à chaque
   cible/particule/texte, principale source de saccades et de fuite mémoire GPU */
const targetPool=[], particlePool=[], floatPool=[], floatTexCache=new Map();
let TARGET_GEO=null, PARTICLE_GEO=null, MALUS_GEO=null, ENERGY_GEO=null, BOOM_GEO=null;
let hud,hudCtx,hudTex,hitRing,analyser,freqData,playSource=null,nextBeatIndex=0,started3D=false;
let ringFlash=0, resultMesh,resultCtx,resultTex;

function makeWeapons(color){
  // Pistolet
  const pistol=new THREE.Group();
  const pb=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.09,0.05),new THREE.MeshStandardMaterial({color:0x2a2440,roughness:.6}));
  pb.position.set(0,-0.02,0.01); pistol.add(pb);
  const pBarrel=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.03,0.15),
    new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:.5,roughness:.3}));
  pBarrel.position.set(0,0.01,-0.08); pistol.add(pBarrel);

  // Mitraillette (plus longue + chargeur)
  const smg=new THREE.Group();
  const sb=new THREE.Mesh(new THREE.BoxGeometry(0.045,0.07,0.16),new THREE.MeshStandardMaterial({color:0x241f38,roughness:.6}));
  sb.position.set(0,-0.01,-0.02); smg.add(sb);
  const sBarrel=new THREE.Mesh(new THREE.BoxGeometry(0.025,0.025,0.22),
    new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:.5,roughness:.3}));
  sBarrel.position.set(0,0.01,-0.16); smg.add(sBarrel);
  const mag=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.09,0.03),new THREE.MeshStandardMaterial({color:0x161226}));

  const emitter=new THREE.Mesh(new THREE.CylinderGeometry(0.021,0.019,0.025,16),

  emitter.position.set(0,0.095,0); sword.add(emitter);
  // cœur blanc lumineux
  const core=new THREE.Mesh(new THREE.CylinderGeometry(0.011,0.011,SABER_LEN,14),
    new THREE.MeshBasicMaterial({color:0xffffff}));
  core.position.set(0,bladeY,0); sword.add(core);
  // halo coloré (donne la couleur de la main)
  const glow=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,SABER_LEN,16),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.45,blending:THREE.AdditiveBlending,depthWrite:false}));
  glow.position.set(0,bladeY,0); sword.add(glow);
  // pointe arrondie (cœur + halo)
  const tipCore=new THREE.Mesh(new THREE.SphereGeometry(0.011,14,10),new THREE.MeshBasicMaterial({color:0xffffff}));
  tipCore.position.set(0,tipY,0); sword.add(tipCore);
  const tipGlow=new THREE.Mesh(new THREE.SphereGeometry(0.028,14,10),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.45,blending:THREE.AdditiveBlending,depthWrite:false}));
  tipGlow.position.set(0,tipY,0); sword.add(tipGlow);
  sword.rotation.x=SABER_TILT;   // incline la lame vers l'avant pour qu'elle prolonge la main

  // Laser de visée
  const laser=new THREE.Mesh(new THREE.CylinderGeometry(0.004,0.004,9,6),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.2}));

  // Jauge de surchauffe (mitraillette)
  const heatBg=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.012,0.004),new THREE.MeshBasicMaterial({color:0x222232}));
  heatBg.position.set(0,0.06,0.02);
  const fillGeo=new THREE.BoxGeometry(0.12,0.012,0.006); fillGeo.translate(0.06,0,0);
  const heatFill=new THREE.Mesh(fillGeo,new THREE.MeshBasicMaterial({color:0x4fd6c8}));
  heatFill.position.set(-0.06,0.06,0.021); heatFill.scale.x=0.001;

  return {pistol,smg,sword,laser,heatBg,heatFill,colored:[pBarrel,sBarrel,glow,tipGlow],sBarrel};
}

/* Traînée du sabre : ruban entre la base et la pointe de la lame, échantillonné
   à chaque frame et estompé du plus récent (près de la lame) au plus ancien. */
function makeTrail(color){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(TRAIL_SEG*2*3), col=new Float32Array(TRAIL_SEG*2*3);
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const idx=[];
  for(let i=0;i<TRAIL_SEG-1;i++){ const a=i*2; idx.push(a,a+1,a+2, a+1,a+3,a+2); }
  geo.setIndex(idx);
  const mesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({vertexColors:true,transparent:true,
    opacity:0.9,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide}));
  mesh.frustumCulled=false; mesh.renderOrder=997; mesh.visible=false;
  return {mesh,geo,samples:[],color:new THREE.Color(color)};
}
function updateTrail(c){
  const tr=c.userData.trail; if(!tr) return;
  const m=saberUltLen();
  _a.set(0,SABER_BASE*m,0).applyAxisAngle(_xAxis,SABER_TILT); c.localToWorld(_a);              // base de la lame (monde)
  _b.set(0,(SABER_BASE+SABER_LEN)*m,0).applyAxisAngle(_xAxis,SABER_TILT); c.localToWorld(_b);   // pointe (monde)
  tr.samples.unshift({bx:_a.x,by:_a.y,bz:_a.z,tx:_b.x,ty:_b.y,tz:_b.z});
  if(tr.samples.length>TRAIL_SEG) tr.samples.pop();
  const pos=tr.geo.attributes.position.array, col=tr.geo.attributes.color.array, n=tr.samples.length, cc=tr.color;
  for(let i=0;i<TRAIL_SEG;i++){
    const s=tr.samples[Math.min(i,n-1)], a=i*6;
    pos[a]=s.bx; pos[a+1]=s.by; pos[a+2]=s.bz;
    pos[a+3]=s.tx; pos[a+4]=s.ty; pos[a+5]=s.tz;
    const f=(1-i/(TRAIL_SEG-1)); const g=f*f;                // estompage quadratique
    col[a]=cc.r*g; col[a+1]=cc.g*g; col[a+2]=cc.b*g;
    col[a+3]=cc.r*g; col[a+4]=cc.g*g; col[a+5]=cc.b*g;
  }
  tr.geo.attributes.position.needsUpdate=true; tr.geo.attributes.color.needsUpdate=true;
}

/* ==================== DÉCOR ==================== */
function buildEnvironment(){
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(60,60),
    new THREE.MeshStandardMaterial({color:0x0a0d18,roughness:1}));
  floor.rotation.x=-Math.PI/2; floor.position.y=-0.01; scene.add(floor);
  const grid=new THREE.GridHelper(60,60,0x3a6ea5,0x241a3e);
  grid.material.opacity=0.28; grid.material.transparent=true; scene.add(grid);

  const N=600, pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=22+Math.random()*20, th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI*0.5;
    pos[i*3]=Math.cos(th)*Math.sin(ph)*r;
    pos[i*3+1]=Math.cos(ph)*r*0.8+1;
    pos[i*3+2]=-Math.abs(Math.sin(th)*Math.sin(ph)*r)-3;
  }
  const sg=new THREE.BufferGeometry(); sg.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x9fb4ff,size:0.08,transparent:true,opacity:.75})));

  const gate=new THREE.Mesh(new THREE.TorusGeometry(2.4,0.05,10,60),
    new THREE.MeshStandardMaterial({color:0x000000,emissive:0xffcf5c,emissiveIntensity:.5}));
  gate.position.set(0,1.3,SPAWN_Z-0.3); scene.add(gate); reactive.push({mesh:gate,base:.5});

  for(let z=-2.2; z>=-22; z-=1.7){
    for(const side of [-1,1]){
      const h=1.1+Math.abs(Math.sin(z*0.7))*1.4;
      const col=side<0?PALETTE[0]:PALETTE[1];
      const py=new THREE.Mesh(new THREE.BoxGeometry(0.1,h,0.1),
        new THREE.MeshStandardMaterial({color:0x140f24,emissive:col,emissiveIntensity:.45,roughness:.5}));
      py.position.set(side*1.75,h/2,z); scene.add(py); reactive.push({mesh:py,base:.45});
    }
  }
  for(const side of [-1,1]){
    const strip=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.012,20),
      new THREE.MeshStandardMaterial({color:0x000000,emissive:0xffcf5c,emissiveIntensity:.5}));
    strip.position.set(side*1.25,0.006,-9.5); scene.add(strip); reactive.push({mesh:strip,base:.5});
  }
}

/* ===================== SESSION / MENU ===================== */
async function enterVR(){
  if(!started3D) init3D();
  applyWeapon();
  if(!navigator.xr){ setStatus('WebXR indisponible sur cet appareil.',null); showMenu(); return; }
  try{
    const session=await navigator.xr.requestSession('immersive-vr',{optionalFeatures:['local-floor','bounded-floor']});
    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(session);
    try{ renderer.xr.setFoveation && renderer.xr.setFoveation(1); }catch(e){}   // rendu fovéal max : soulage le GPU en périphérie
    session.addEventListener('end',onSessionEnd);
    el('menu').style.display='none';
    state='idle'; hud.visible=true; resultMesh.visible=false; drawHud('Gâchette : lancer','B : quitter');
  }catch(err){ console.error(err); setStatus('VR impossible : '+err.message,null); showMenu(); }

function onSessionEnd(){ stopSong(); clearTargets(); state='menu';
  if(resultMesh) resultMesh.visible=false; if(hud) hud.visible=true; showMenu(); }
function showMenu(){ el('menu').style.display='flex'; el('hud2d').style.display='none'; el('back').style.display='none'; }
function quitToMenu(){

}

function startCountdown(){
  score=0;combo=0;bestCombo=0;hitCount=0;missCount=0;nextBeatIndex=0;
  charge=0;bassAvg=0;lastDrop=0; ultActive=false; ultWeapon=null;
  clearTargets(); applyWeapon(); resultMesh.visible=false; hud.visible=true;
  ensureCtx(); lastCount=0; sfx.start();
  state='countdown'; countdownEnd=performance.now()+3000;
}
function startSong(){
  const ctx=ensureCtx(); if(ctx.state==='suspended') ctx.resume();
  playSource=ctx.createBufferSource(); playSource.buffer=decodedBuffer;
  analyser=ctx.createAnalyser(); analyser.fftSize=128; freqData=new Uint8Array(analyser.frequencyBinCount);
  playSource.connect(analyser); analyser.connect(ctx.destination);
  songStartTime=ctx.currentTime+0.05; playSource.start(songStartTime);
  sfx.go();
  state='playing'; updateHudScore();
}
function stopSong(){ try{ playSource&&playSource.stop(); }catch(e){} playSource=null; }
function pauseGame(){ if(state!=='playing')return; state='paused'; audioCtx.suspend();
  for(const c of controllers) c.userData.firing=false;
  drawHud('PAUSE','gâchette: reprendre · B: quitter'); }
function resumeGame(){ if(state!=='paused')return; audioCtx.resume(); state='playing'; updateHudScore(); }
function finish(){
  stopSong(); state='finished'; for(const c of controllers) c.userData.firing=false;
  hud.visible=false; drawResults(); resultMesh.visible=true;
  const acc=accuracy();
  el('hudScore').textContent=score;
  el('hudCombo').textContent='rang '+rankFor(acc)[0]+' · '+acc+'% · combo max ×'+bestCombo;
}
function songTimeNow(){ return audioCtx?audioCtx.currentTime-songStartTime:0; }
function accuracy(){ const tot=hitCount+missCount; return tot>0?Math.round(100*hitCount/tot):0; }
function rankFor(a){ if(a>=95)return['S',0xffcf5c]; if(a>=85)return['A',0x4fd6c8];
  if(a>=70)return['B',0x8ad07a]; if(a>=50)return['C',0xffa15c]; return['D',0xff5b5b]; }
/* score : simple bonus de combo, plafonné à ×20 (pas de synchro rythmique) */
function comboBonus(){ return 100+Math.min(combo,20)*10; }

/* ========================= CIBLES ========================= */
/* pools par type : chaque type a sa géométrie, on ne mélange donc pas les meshes */
const MESH_POOLS={normal:targetPool, malus:[], energie:[], boom:[]};
function targetGeo(type){ return type==='malus'?MALUS_GEO : type==='energie'?ENERGY_GEO : type==='boom'?BOOM_GEO : TARGET_GEO; }
/* icône flottante (emoji) posée au-dessus des bonus/malus pour les rendre non ambigus */
const _spriteTex={};
function spriteTexFor(type){
  if(_spriteTex[type]) return _spriteTex[type];
  const emo = type==='malus'?'⛔' : type==='energie'?'⚡' : '💥';
  const cv=document.createElement('canvas'); cv.width=128; cv.height=128;
  const cx=cv.getContext('2d'); cx.textAlign='center'; cx.textBaseline='middle'; cx.font='96px serif';
  cx.fillText(emo,64,74);
  const tex=new THREE.CanvasTexture(cv); _spriteTex[type]=tex; return tex;
}
function getTargetMesh(type,color){
  const pool=MESH_POOLS[type]||targetPool;
  let mesh=pool.pop();
  if(!mesh){
    mesh=new THREE.Mesh(targetGeo(type),
      new THREE.MeshStandardMaterial({emissiveIntensity:type==='normal'?.5:1.0,roughness:.3,metalness:.15}));
    mesh.userData.pool=pool;
    if(type!=='normal'){   // étiquette emoji billboardée (le Sprite fait toujours face à la caméra)
      const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:spriteTexFor(type),depthTest:false,transparent:true}));
      spr.scale.set(0.2,0.2,0.2); spr.position.set(0,0.32,0); spr.renderOrder=996; mesh.add(spr);
    }
  }
  // couleur propre au type (les bonus n'empruntent plus la couleur de la main)
  if(type==='malus'){ mesh.material.color.setHex(0x160010); mesh.material.emissive.setHex(T_MALUS); }
  else if(type==='energie'){ mesh.material.color.setHex(T_ENERGY); mesh.material.emissive.setHex(T_ENERGY); }
  else if(type==='boom'){ mesh.material.color.setHex(T_BOOM); mesh.material.emissive.setHex(T_BOOM); }
  else { mesh.material.color.setHex(color); mesh.material.emissive.setHex(color); }
  mesh.scale.setScalar(type==='boom'?1.25:1);
  mesh.rotation.set(0,0,0); mesh.visible=true;
  if(!mesh.parent) scene.add(mesh);
  return mesh;
}
function releaseTargetMesh(mesh){ mesh.visible=false; mesh.scale.setScalar(1); (mesh.userData.pool||targetPool).push(mesh); }
function pickType(){
  const r=Math.random();
  if(r<0.09) return 'malus';                              // piège à éviter (9 %)
  if(r<0.19) return charge>=1 ? 'normal' : 'energie';     // énergie (10 %) — inutile si la jauge est pleine
  if(r<0.22) return 'boom';                               // bombe / AoE (3 %)
  return 'normal';
}
function spawnTarget(beatTime,idx,type){
  const lane=LANES[idx%LANES.length], t=type||'normal';
  // couleur associée à une main, ou couleur neutre si l'association est désactivée
  const color = colorMatch ? PALETTE[idx%2] : NEUTRAL_TARGET;
  const mesh=getTargetMesh(t,color);
  mesh.position.set(lane.x,lane.y,SPAWN_Z);
  targets.push({mesh,beatTime,color,x:lane.x,y:lane.y,hit:false,dead:false,type:t});
}
/* vague déclenchée sur un drop : ~6 cibles normales échelonnées, arrivant depuis le fond */
function spawnWave(){
  if(targets.length>40) return;
  for(let i=0;i<6;i++) spawnTarget(songTimeNow()+TRAVEL+i*0.13, i%LANES.length, 'normal');
  spawnFloat('DROP !',0xffcf5c,new THREE.Vector3(0,1.75,HIT_Z));
  for(const r of reactive) r.mesh.material.emissiveIntensity=r.base*2.4;   // flash bref du décor
  sfx.go();
}
function updateTargets(st){
  while(nextBeatIndex<beats.length && beats[nextBeatIndex]-TRAVEL<=st){ spawnTarget(beats[nextBeatIndex],nextBeatIndex,pickType()); nextBeatIndex++; }
  for(const t of targets){
    if(t.dead) continue;
    const p=(st-(t.beatTime-TRAVEL))/TRAVEL;
    t.mesh.position.z=SPAWN_Z+(HIT_Z-SPAWN_Z)*p;
    if(t.type==='normal'){ t.mesh.rotation.x+=0.02; t.mesh.rotation.y+=0.03; }
    else { t.mesh.rotation.y+=0.015;   // spéciales : pulsation qui attire l'œil, icône maintenue au-dessus
      t.mesh.scale.setScalar((t.type==='boom'?1.25:1)*(1+0.14*Math.sin(performance.now()*0.006))); }
    if(!t.hit && p>HIT_LATE){
      if(t.type==='normal') onMiss(t);
      else { t.dead=true; t.mesh.visible=false; }   // piège évité (ok) / bonus manqué : sans pénalité
    }
  }
  for(let i=targets.length-1;i>=0;i--){ if(targets[i].dead){ releaseTargetMesh(targets[i].mesh); targets.splice(i,1); } }
}
function onMiss(t){
  t.dead=true; t.mesh.visible=false; combo=0; missCount++; updateHudScore();
  burst(t.mesh.position, new THREE.Color(0xff3b3b));
  spawnFloat('RATÉ', 0xff5b5b, new THREE.Vector3(THREE.MathUtils.clamp(t.x,-0.8,0.8),1.35,HIT_Z));
  ringFlash=performance.now()+240; sfx.miss();
}
function clearTargets(){ for(const t of targets) releaseTargetMesh(t.mesh); targets.length=0; nextBeatIndex=0; }

/* ==================== MÉCANIQUES D'ARME ==================== */
const _p=new THREE.Vector3(),_q=new THREE.Quaternion(),_fwd=new THREE.Vector3(),_dir=new THREE.Vector3();
const _a=new THREE.Vector3(),_b=new THREE.Vector3(),_pt=new THREE.Vector3();
const _xAxis=new THREE.Vector3(1,0,0);   // axe de la bascule de la lame (doit rester synchro avec sword.rotation.x)

function fireShot(controller){          // pistolets + mitraillettes
  const color=controller.userData.color;
  controller.getWorldPosition(_p); controller.getWorldQuaternion(_q);
  _fwd.set(0,0,-1).applyQuaternion(_q).normalize();
  controller.userData.flash=performance.now()+70;
  let best=null,bestAng=AIM_CONE;
  for(const t of targets){
    if(t.dead||t.hit||(colorMatch && t.type==='normal' && t.color!==color)) continue;   // spéciales : toute main
    const p=(songTimeNow()-(t.beatTime-TRAVEL))/TRAVEL;
    if(p<HIT_EARLY||p>HIT_LATE) continue;
    _dir.copy(t.mesh.position).sub(_p).normalize();
    const ang=_fwd.angleTo(_dir);
    if(ang<bestAng){ bestAng=ang; best=t; }
  }
  if(best){ resolveHit(best); haptic(controller,0.6,50);
    if(ultActive && ultWeapon==='pistols') grenadeExplode(best.mesh.position);   // tir-grenade : AoE
    return true; }
  return false;
}

function meleeCheck(controller){        // épées : contact
  const color=controller.userData.color;
  // segment lame incliné (émetteur → pointe), même bascule que le visuel
  const m=saberUltLen();
  _a.set(0,SABER_BASE*m,0).applyAxisAngle(_xAxis,SABER_TILT);           controller.localToWorld(_a);
  _b.set(0,(SABER_BASE+SABER_LEN)*m,0).applyAxisAngle(_xAxis,SABER_TILT); controller.localToWorld(_b);
  const reach=SWORD_REACH*(ultActive&&ultWeapon==='swords'?SABER_ULT_REACH:1);
  for(const t of targets){
    if(t.dead||t.hit||(colorMatch && t.type==='normal' && t.color!==color)) continue;   // spéciales : toute main
    const p=(songTimeNow()-(t.beatTime-TRAVEL))/TRAVEL;
    if(p<HIT_EARLY||p>HIT_LATE) continue;
    if(distToSegment(t.mesh.position,_a,_b)<reach){ resolveHit(t); haptic(controller,0.7,55); }
  }
}
function distToSegment(pt,a,b){
  _dir.copy(b).sub(a); const len2=_dir.lengthSq();
  let s=len2>0 ? _dir.dot(_pt.copy(pt).sub(a))/len2 : 0;
  s=Math.max(0,Math.min(1,s));
  _pt.copy(a).addScaledVector(_dir,s);
  return _pt.distanceTo(pt);
}

// aiguille chaque coup vers le bon comportement selon le type de cible
function resolveHit(t){
  if(t.type==='malus')   return hitMalus(t);
  if(t.type==='energie') return hitEnergy(t);
  if(t.type==='boom')    return hitBoom(t);
  return hitTarget(t);
}
function hitTarget(t){
  t.hit=true; t.dead=true; hitCount++; combo++; bestCombo=Math.max(bestCombo,combo);
  score+=comboBonus();
  addCharge(0.03);
  burst(t.mesh.position,t.mesh.material.color); t.mesh.visible=false;
  sfx.hit(combo); updateHudScore();
}
function hitMalus(t){
  t.hit=true; t.dead=true; combo=0; missCount++;
  score=Math.max(0,score-MALUS_PEN);
  burst(t.mesh.position,new THREE.Color(T_MALUS)); t.mesh.visible=false;
  spawnFloat('PIÈGE −'+MALUS_PEN, T_MALUS, t.mesh.position.clone().setY(t.y+0.18));
  ringFlash=performance.now()+320; sfx.miss(); updateHudScore();
}
function hitEnergy(t){
  t.hit=true; t.dead=true; hitCount++;
  addCharge(0.25); score+=comboBonus();
  burst(t.mesh.position,new THREE.Color(T_ENERGY)); t.mesh.visible=false;
  spawnFloat('ÉNERGIE ⚡', T_ENERGY, t.mesh.position.clone().setY(t.y+0.18));
  sfx.hit(combo); updateHudScore();
}
function hitBoom(t){
  t.hit=true; t.dead=true; hitCount++; combo++; bestCombo=Math.max(bestCombo,combo);
  const center=t.mesh.position.clone(); let cleared=0;
  // la bombe fait exploser TOUTES les cibles à l'écran, pièges compris
  for(const o of targets){
    if(o===t||o.dead||o.hit) continue;
    o.hit=true; o.dead=true; o.mesh.visible=false; cleared++;
    if(o.type!=='malus') hitCount++;   // un piège nettoyé n'est pas une cible « touchée » et ne pénalise pas
    burst(o.mesh.position,o.mesh.material.emissive);
  }
  score+=comboBonus()*(1+cleared);
  addCharge(0.05+cleared*0.02);
  burst(center,new THREE.Color(T_BOOM)); burst(center,new THREE.Color(0xffffff)); t.mesh.visible=false;
  spawnFloat('BOOM ×'+(cleared+1), T_BOOM, center.clone().setY(t.y+0.18));
  ringFlash=performance.now()+260; sfx.overheat(); updateHudScore();
}
function haptic(c,intensity,ms){ try{ c.userData.source?.gamepad?.hapticActuators?.[0]?.pulse(intensity,ms);}catch(e){} }

/* ==================== ULTIME ==================== */
const saberUltLen=()=>ultActive&&ultWeapon==='swords'?SABER_ULT_LEN:1;   // allongement de la lame pendant l'ultime
function activateUltimate(){
  if(state!=='playing' || charge<1 || ultActive) return;
  ultActive=true; ultWeapon=weapon; ultEnd=performance.now()+ULT_DURATION; charge=0;
  applyUltimateVisual(true);
  _pt.copy(_camPos).addScaledVector(_cf,1.7); _pt.y+=0.25; spawnFloat('ULTIME !',0xffcf5c,_pt);
  for(const c of controllers) haptic(c,1.0,140);
  sfx.go(); updateHudScore();
}
function endUltimate(){
  ultActive=false; ultWeapon=null; applyUltimateVisual(false);
  for(const c of controllers){ c.userData.heat=0; c.userData.overheated=false; }
  updateHudScore();
}
function applyUltimateVisual(on){
  const saber = on && ultWeapon==='swords';
  for(const c of controllers){ const p=c.userData.parts; if(p&&p.sword) p.sword.scale.set(saber?1.3:1, saber?SABER_ULT_LEN:1, saber?1.3:1); }
}
/* grenade (ultime pistolets) : explosion de zone autour du point d'impact */
function grenadeExplode(center){
  let cleared=0;
  for(const o of targets){
    if(o.dead||o.hit) continue;
    if(o.mesh.position.distanceTo(center)<ULT_GRENADE_RADIUS){
      o.hit=true; o.dead=true; o.mesh.visible=false; cleared++;
      if(o.type!=='malus') hitCount++;
      burst(o.mesh.position,o.mesh.material.emissive);
    }
  }
  if(cleared) score+=comboBonus()*cleared;
  burst(center,new THREE.Color(0xffa030)); burst(center,new THREE.Color(0xffffff));
  ringFlash=performance.now()+180; updateHudScore();
}

/* ==================== PARTICULES & TEXTES ==================== */
function burst(pos,color){
  for(let i=0;i<10;i++){
    let p=particlePool.pop();
    if(!p) p=new THREE.Mesh(PARTICLE_GEO,new THREE.MeshBasicMaterial({transparent:true}));
    p.material.color.copy(color); p.material.opacity=1; p.visible=true;
    p.position.copy(pos); if(!p.parent) scene.add(p);
    const v=new THREE.Vector3((Math.random()-.5)*2,(Math.random()-.5)*2,(Math.random()-.5)*2).multiplyScalar(1.8);
    particles.push({mesh:p,v,life:0.5});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const pa=particles[i]; pa.life-=dt;
    pa.mesh.position.addScaledVector(pa.v,dt); pa.v.multiplyScalar(0.92);
    pa.mesh.material.opacity=Math.max(0,pa.life/0.5);
    if(pa.life<=0){ pa.mesh.visible=false; particlePool.push(pa.mesh); particles.splice(i,1); }
  }
}
function floatTexture(text,color){
  // les textes ('RATÉ', 'SURCHAUFFE'…) sont peu nombreux : on met leur texture en cache
  const key=text+'|'+color; let tex=floatTexCache.get(key); if(tex) return tex;
  const cv=document.createElement('canvas'); cv.width=256; cv.height=128;
  const cx=cv.getContext('2d'); cx.textAlign='center'; cx.textBaseline='middle';
  cx.font='700 64px Inter, sans-serif';
  cx.lineWidth=8; cx.strokeStyle='rgba(0,0,0,.55)'; cx.strokeText(text,128,64);
  cx.fillStyle='#'+color.toString(16).padStart(6,'0'); cx.fillText(text,128,64);
  tex=new THREE.CanvasTexture(cv); floatTexCache.set(key,tex); return tex;
}
function spawnFloat(text,color,pos){
  const tex=floatTexture(text,color);
  let m=floatPool.pop();
  if(!m){ m=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.25),
    new THREE.MeshBasicMaterial({transparent:true,depthTest:false})); m.renderOrder=998; }
  m.material.map=tex; m.material.needsUpdate=true; m.material.opacity=1; m.visible=true;
  m.position.copy(pos); if(!m.parent) scene.add(m);
  floats.push({mesh:m,life:0.85});
}
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.life-=dt;
    f.mesh.position.y+=dt*0.55;
    f.mesh.material.opacity=Math.max(0,f.life/0.85);
    f.mesh.quaternion.copy(_camQuat);
    if(f.life<=0){ f.mesh.visible=false; floatPool.push(f.mesh); floats.splice(i,1); }
  }
}

/* ========================== HUD ========================== */
function drawHud(l1,l2,gauge,ult){
  hudCtx.clearRect(0,0,512,200);
  hudCtx.fillStyle='rgba(11,14,26,.72)'; roundRect(hudCtx,6,6,500,188,22); hudCtx.fill();
  const withGauge = gauge!=null;
  hudCtx.textAlign='center'; hudCtx.fillStyle='#f2ede4'; hudCtx.font='600 62px Inter, sans-serif';
  hudCtx.fillText(l1,256, withGauge?84:96);
  if(l2){ hudCtx.fillStyle='#8f8ab0'; hudCtx.font='500 24px "IBM Plex Mono", monospace'; hudCtx.fillText(l2,256, withGauge?130:150); }
  if(withGauge){
    const x=40,y=156,w=432,h=15, gold=ult||gauge>=1;
    hudCtx.fillStyle='rgba(255,255,255,.09)'; roundRect(hudCtx,x,y,w,h,8); hudCtx.fill();
    hudCtx.fillStyle= gold?'#ffcf5c':'#4fd6c8'; roundRect(hudCtx,x,y,Math.max(7,w*gauge),h,8); hudCtx.fill();
    hudCtx.fillStyle= gold?'#ffcf5c':'#8f8ab0'; hudCtx.font='500 17px "IBM Plex Mono", monospace';
    hudCtx.fillText(ult?'ULTIME ACTIF':(gauge>=1?'ULTIME PRÊT — A / 2 gâchettes':'charge'), 256, 187);
  }
  hudTex.needsUpdate=true;
}
function updateHudScore(){
  const ult=ultActive, secs=ult?Math.max(0,Math.ceil((ultEnd-performance.now())/1000)):0;
  const g = ult ? Math.max(0,(ultEnd-performance.now())/ULT_DURATION) : charge;
  drawHud(String(score), ult?('ULTIME · '+secs+'s'):('combo ×'+combo), g, ult);
  el('hudScore').textContent=score;
  el('hudCombo').textContent = ult ? ('ULTIME '+secs+'s') : ('combo ×'+combo); }
function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

function drawResults(){
  const c=resultCtx, W=700,H=460; c.clearRect(0,0,W,H);
  c.fillStyle='rgba(10,12,22,.9)'; roundRect(c,8,8,W-16,H-16,26); c.fill();
  c.strokeStyle='rgba(255,255,255,.1)'; c.lineWidth=2; c.stroke();
  const acc=accuracy(), rk=rankFor(acc), rank=rk[0], rc=rk[1];
  c.textAlign='left';
  c.fillStyle='#8f8ab0'; c.font='500 22px "IBM Plex Mono", monospace'; c.fillText('T E R M I N É', 48, 66);
  c.fillStyle='#f2ede4'; c.font='600 96px Inter, sans-serif'; c.fillText(String(score), 46, 168);
  c.fillStyle='#8f8ab0'; c.font='500 22px "IBM Plex Mono", monospace'; c.fillText('points', 50, 200);
  c.textAlign='center';
  c.fillStyle='#'+rc.toString(16).padStart(6,'0'); c.font='700 150px Inter, sans-serif'; c.fillText(rank, 560, 175);
  c.textAlign='left';
  const rows=[['précision', acc+' %'],['combo max', '×'+bestCombo],['cibles touchées', String(hitCount)],['ratées', String(missCount)]];
  c.font='500 26px "IBM Plex Mono", monospace';
  rows.forEach((r,i)=>{ const y=270+i*38;
    c.fillStyle='#8f8ab0'; c.fillText(r[0], 50, y);
    c.fillStyle='#f2ede4'; c.textAlign='right'; c.fillText(r[1], 470, y); c.textAlign='left'; });
  c.fillStyle='#8f8ab0'; c.font='500 22px "IBM Plex Mono", monospace'; c.textAlign='center';
  c.fillText('gâchette : rejouer      ·      B : quitter', W/2, H-40);
  resultTex.needsUpdate=true;
}

/* ========================= BOUCLE ========================= */
const _camPos=new THREE.Vector3(), _camQuat=new THREE.Quaternion(), _cf=new THREE.Vector3();
const _cHot=new THREE.Color(0xff3b3b), _cCool=new THREE.Color(0x4fd6c8), _cTmp=new THREE.Color();
function loop(){
  const dt=Math.min(clock.getDelta(),0.05);
  const cam=renderer.xr.isPresenting?renderer.xr.getCamera():camera;
  cam.getWorldPosition(_camPos); cam.getWorldQuaternion(_camQuat);
  _cf.set(0,0,-1).applyQuaternion(_camQuat);

  hud.position.copy(_camPos).addScaledVector(_cf,1.4); hud.position.y-=0.42; hud.quaternion.copy(_camQuat);
  if(state==='finished' && resultMesh.visible){
    resultMesh.position.copy(_camPos).addScaledVector(_cf,1.9); resultMesh.quaternion.copy(_camQuat);
  }

  const now=performance.now();
  if(ultActive && now>ultEnd) endUltimate();
  let bothTrig = controllers.length>=2, anyTrigSrc=false;
  for(const c of controllers){
    const gp=c.userData.source&&c.userData.source.gamepad;
    const pressed=gp&&gp.buttons[5]?gp.buttons[5].pressed:false;
    if(pressed&&!c.userData.prevB) onBButton();
    c.userData.prevB=pressed;
    const aBtn=gp&&gp.buttons[4]?gp.buttons[4].pressed:false;      // A / X : déclenche l'ultime
    if(aBtn&&!c.userData.prevA) activateUltimate();
    c.userData.prevA=aBtn;
    if(gp){ anyTrigSrc=true; if(!(gp.buttons[0]&&gp.buttons[0].pressed)) bothTrig=false; } else bothTrig=false;
    const p=c.userData.parts;
    if(p&&p.laser.visible) p.laser.material.opacity=now<c.userData.flash?0.95:0.18;
    // traînée du sabre : active tant qu'on tient le sabre (hors menu/pause)
    const tr=c.userData.trail;
    if(tr){ const on = weapon==='swords' && state!=='menu' && state!=='paused';
      tr.mesh.visible=on; if(on) updateTrail(c); else tr.samples.length=0; }
  }
  if(bothTrig && anyTrigSrc && !bothTrigPrev) activateUltimate();   // les 2 gâchettes maintenues ensemble
  bothTrigPrev = bothTrig && anyTrigSrc;

  if(state==='countdown'){
    const remain=(countdownEnd-now)/1000;
    if(remain<=0){ startSong(); }
    else { const n=Math.ceil(remain); if(n!==lastCount){ lastCount=n; sfx.tick(); } drawHud(String(n),'prépare-toi'); }
  }

  if(state==='playing'){
    const st=songTimeNow(); updateTargets(st);
    for(const c of controllers){
      if(weapon==='swords'){ meleeCheck(c); }
      else if(weapon==='smg'){
        const inf = ultActive && ultWeapon==='smg';   // ultime : surchauffe illimitée
        c.userData.heat=Math.max(0,c.userData.heat-HEAT_COOL*dt);
        if(inf){ c.userData.heat=0; c.userData.overheated=false; }
        if(c.userData.overheated && c.userData.heat<=HEAT_RESUME) c.userData.overheated=false;
        if(c.userData.firing && !c.userData.overheated && (now-c.userData.lastShot)/1000>=SMG_INTERVAL){
          fireShot(c); c.userData.lastShot=now;
          if(!inf){ c.userData.heat+=HEAT_PER_SHOT;
            if(c.userData.heat>=1){ c.userData.heat=1; c.userData.overheated=true;
              controllerWorld(c,_pt); spawnFloat('SURCHAUFFE',0xff5b5b,_pt); sfx.overheat(); } }
        }
        // jauge + teinte (violet pendant l'ultime)
        const pr=c.userData.parts;
        pr.heatFill.scale.x=Math.max(0.001,c.userData.heat);
        _cTmp.copy(_cCool).lerp(_cHot,c.userData.heat); pr.heatFill.material.color.copy(_cTmp);
        pr.sBarrel.material.emissive.setHex(inf?0x8b5cff:(c.userData.overheated?0xff3b3b:c.userData.color));
      }
    }
    if(ultActive && now-lastUltHud>150){ lastUltHud=now; updateHudScore(); }   // décompte de l'ultime
    if(st>songDuration+1.5) finish();
  }

  // réactivité basses + détection de drop → vague
  let bass=0;
  if(state==='playing' && analyser){ analyser.getByteFrequencyData(freqData);
    for(let i=0;i<6;i++) bass+=freqData[i]; bass/=6*255;
    if(bass>bassAvg*1.6 && bass>0.5 && now-lastDrop>4000 && targets.length<40){ lastDrop=now; spawnWave(); }
    bassAvg=bassAvg*0.95+bass*0.05;
  }
  for(const r of reactive){ r.mesh.material.emissiveIntensity=r.base*(0.55+bass*1.7); }
  hitRing.material.opacity=0.25+bass*0.5;
  hitRing.material.color.setHex(now<ringFlash?0xff3b3b:0xffcf5c);
  hitRing.scale.setScalar(1+bass*0.06);

  updateParticles(dt); updateFloats(dt);
  renderer.render(scene,camera);
}
function controllerWorld(c,out){ out.set(0,0.1,-0.2); c.localToWorld(out); }

/* ======================== ENTRÉES ======================== */
function onSelect(controller){
  if(state==='idle'||state==='finished') startCountdown();
  else if(state==='paused') resumeGame();
  else if(state==='playing'){
    if(weapon==='pistols') fireShot(controller);
    else if(weapon==='smg'){ controller.userData.firing=true; controller.userData.lastShot=0; }
    // épées : rien à la gâchette (contact géré en continu)
  }
}
function onBButton(){
  if(state==='playing') pauseGame();
  else if(state==='paused'||state==='idle'||state==='finished') quitToMenu();
}
function onDesktopClick(){
  if(renderer.xr.isPresenting) return;
  if(state==='idle'||state==='finished'){ startCountdown(); return; }
  if(state==='paused'){ resumeGame(); return; }
  if(state==='playing'){
    let best=null,bp=99;
    for(const t of targets){ if(t.dead||t.hit)continue;
      const p=(songTimeNow()-(t.beatTime-TRAVEL))/TRAVEL;
      if(p<HIT_EARLY||p>HIT_LATE)continue; if(Math.abs(1-p)<Math.abs(1-bp)){bp=p;best=t;} }
    if(best) resolveHit(best);
  }
}
function onKey(e){
  if(renderer.xr.isPresenting) return;
  if(e.key==='p'||e.key==='P'){ if(state==='playing')pauseGame(); else if(state==='paused')resumeGame(); }
  else if(e.key==='u'||e.key==='U'){ activateUltimate(); }   // ultime (bureau)
  else if(e.key==='Escape'){ if(state!=='menu') quitToMenu(); }
}

/* ========================= MENU UI ========================= */
function refreshLegend(){
  const L='#'+handColor('left').toString(16).padStart(6,'0');
  const R='#'+handColor('right').toString(16).padStart(6,'0');
  const li=el('legLeft').querySelector('i'), ri=el('legRight').querySelector('i');
  li.style.background=L; li.style.boxShadow='0 0 8px '+L;
  ri.style.background=R; ri.style.boxShadow='0 0 8px '+R;
}
el('file').addEventListener('change',e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });
const drop=el('drop');
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
drop.addEventListener('drop',e=>{ const f=e.dataTransfer.files[0]; if(f) loadFile(f); });
el('dens').addEventListener('change',async e=>{
  sensitivity=parseFloat(e.target.value);
  if(decodedBuffer){ setStatus('Ré-analyse…','busy');
    beats=await analyze(decodedBuffer,sensitivity); drawWaveform(decodedBuffer,beats);
    setStatus(beats.length+' battements · ~'+estimateBpm(beats)+' BPM · '+fmt(songDuration),'ok'); }
});
el('assist').addEventListener('input',e=>{ hitAssist=parseFloat(e.target.value); applyDifficulty(); });
el('colorMatch').addEventListener('click',()=>{
  colorMatch=!colorMatch;
  const b=el('colorMatch');
  b.classList.toggle('on',colorMatch); b.classList.toggle('off',!colorMatch);
  el('swap').style.opacity=colorMatch?'1':'.35';   // inverser n'a de sens qu'avec l'association active
});
el('soundBtn').addEventListener('click',()=>{
  sfxOn=!sfxOn;
  const b=el('soundBtn');
  b.classList.toggle('on',sfxOn); b.classList.toggle('off',!sfxOn);
  el('sndIcon').textContent=sfxOn?'🔊':'🔇';
  if(sfxOn) sfx.tick();   // petit retour audible à l'activation
});
document.querySelectorAll('.wpn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.wpn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); weapon=btn.dataset.w; if(started3D) applyWeapon();
}));
el('swap').addEventListener('click',()=>{ swapColors=!swapColors; refreshLegend();
  for(const c of controllers){ if(c.userData.source){ const col=handColor(c.userData.source.handedness);
    c.userData.color=col; for(const m of c.userData.parts.colored){ m.material.color.setHex(col); if(m.material.emissive) m.material.emissive.setHex(col); }
    c.userData.parts.laser.material.color.setHex(col); if(c.userData.trail) c.userData.trail.color.setHex(col); } } });
el('startVR').addEventListener('click',()=>{ enterVR(); });
el('startPreview').addEventListener('click',()=>{
  el('menu').style.display='none'; el('hud2d').style.display='block'; el('back').style.display='block';
  if(!started3D) init3D(); applyWeapon(); state='idle'; resultMesh.visible=false; hud.visible=true;
});
el('back').addEventListener('click',()=>quitToMenu());
refreshLegend();
</script>
